<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">مشهد سوق الأصول</title>
  <desc id="desc">خلفية محلية بديلة لعرض الأصول في الصفحة الرئيسية.</desc>
  <defs>
