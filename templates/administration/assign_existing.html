{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 60px; padding-bottom: 100px;">
    <div class="card" style="border: 1px solid var(--glass-border); padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.02);">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 70px; height: 70px; background: rgba(52, 152, 219, 0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #3498db; font-size: 2rem;">
                <i class="fas fa-link"></i>
            </div>
            <h2 style="color: #fff; font-weight: 800;">إسناد لوارث لقضية قائمة</h2>
            <p style="color: rgba(255,255,255,0.5);">الوارث: {{ heir_user.full_name|default:heir_user.username }}</p>
        </div>
        
        <div style="background: rgba(52, 152, 219, 0.05); border: 1px solid rgba(52, 152, 219, 0.2); padding: 15px; border-radius: 12px; margin-bottom: 30px; font-size: 0.9rem; color: #3498db; display: flex; gap: 10px; align-items: center;">
            <i class="fas fa-info-circle"></i>
            <span>سيتم ربط هذا الوارث رسمياً بالملف القضائي المختار أدناه.</span>
        </div>
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group mb-4">
                <label style="color: #fff; font-weight: 600; margin-bottom: 10px; display: block;">اختر ملف القضية</label>
                <div style="position: relative;">
                    <i class="fas fa-file-invoice" style="position: absolute; right: 15px; top: 18px; color: var(--primary-color);"></i>
                    <select name="case_id" class="form-control" required style="padding-right: 45px; height: 55px; border-radius: 12px; appearance: none; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);">
                        <option value="" disabled selected>-- اختر من القضايا النشطة --</option>
                        {% for case in cases %}
                        <option value="{{ case.id }}">قضية #{{ case.case_number }} (المتوفى: {{ case.deceased.name|default:"غير مدخل" }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 15px;">
                <button type="submit" class="btn-primary" style="height: 55px; border-radius: 15px; font-weight: 700; font-size: 1.1rem; background: #27ae60; border: none; box-shadow: 0 10px 20px rgba(39,174,96,0.2);">
                    تأكيد الربط القضائي <i class="fas fa-check-double"></i>
                </button>
                <a href="{% url 'administration:dashboard' %}" style="text-align: center; color: rgba(255,255,255,0.5); font-weight: 600; text-decoration: none;">
                    &larr; إلغاء والعودة للمركز
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
