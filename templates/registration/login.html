{% extends 'base.html' %}

{% block content %}
<div class="auth-v3-wrapper">
    <!-- The Stage -->
    <div class="auth-stage-3d">

        <!-- LAYER 1: The Form (Behind) -->
        <div class="stage-layer-under form-3d-card">
            <div class="form-v3-inner">
                <div class="form-header-v3">
                    <h2>تسجيل الدخول</h2>
                    <p>أهلاً بك مجدداً في منصة إرث.</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="error-msg-v3">بيانات الدخول غير صحيحة</div>
                    {% endif %}

                    <div class="input-v3-group">
                        <label>أسم المستخدم</label>
                        <div class="input-v3-container">
                            <input type="text" name="username" autofocus required id="id_username" placeholder="admin">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>

                    <div class="input-v3-group">
                        <label>كلمة المرور</label>
                        <div class="input-v3-container">
                            <input type="password" name="password" required id="id_password" placeholder="••••••••">
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-v3-submit">
                        دخول للمنصة
                    </button>

                    <div class="footer-v3-links">
                        <p>ليس لديك حساب؟ <a href="{% url 'users:register' %}">سجل عضوية</a></p>
                        <p style="margin-top: 10px;"><a href="{% url 'users:password_reset' %}" style="color: #888; font-size: 0.85rem;">نسيت كلمة المرور؟</a></p>
                    </div>
                </form>
            </div>
        </div>

        <!-- LAYER 2: The Visual (Foreground / Overlapping) -->
        <div class="stage-layer-over visual-3d-card">
            <div class="visual-v3-content">
                <div class="icon-3d-ring">
                    <div class="inner-icon">
                        <i class="fas fa-balance-scale"></i>
                    </div>
                    <div class="pulsing-glow"></div>
                </div>
                <div class="visual-v3-text">
                    <h3>إرث</h3>
                    <p>العدالة الرقمية المتكاملة</p>
                </div>
            </div>
            <!-- Shadow caster falling onto the card behind -->
            <div class="depth-shadow"></div>
        </div>

    </div>
</div>

<style>
    /* Absolute Depth 3D Layout */
    .auth-v3-wrapper {
        min-height: 100vh;
        /* Inherit global premium gradient from body if possible, or fallback */
        background: var(--premium-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        overflow: hidden;
        padding: 20px;
    }

    .auth-stage-3d {
        position: relative;
        width: 1000px;
        height: 650px;
        display: flex;
        align-items: center;
    }

    /* THE CARD BEHIND */
    .form-3d-card {
        position: absolute;
        right: 0;
        /* Align to right in RTL */
        width: 700px;
        height: 640px;
        background: rgba(25, 25, 25, 0.6);
        backdrop-filter: blur(50px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 60px;
        z-index: 10;
        padding: 72px 86px 46px 250px;
        /* Leave space on the left for the visual card */
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
    }

    .form-v3-inner {
        width: 100%;
        max-width: 382px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 14px;
    }

    .form-v3-inner form {
        display: flex;
        flex-direction: column;
        min-height: 0;
    }

    .form-header-v3 h2 {
        font-size: 2.35rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 8px;
    }

    .form-header-v3 p {
        color: #888;
        font-size: 1.08rem;
        margin-bottom: 26px;
    }

    .input-v3-group {
        margin-bottom: 24px;
    }

    .input-v3-group label {
        display: block;
        color: #666;
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    .input-v3-container {
        position: relative;
        border-bottom: 2px solid rgba(212, 175, 55, 0.4);
        transition: 0.3s;
        padding-bottom: 10px;
        margin-top: 5px;
    }

    .input-v3-container input {
        width: 100%;
        background: transparent;
        border: none;
        color: #fff;
        font-size: 1.3rem;
        outline: none;
        padding-right: 10px;
        padding-left: 45px;
        text-align: right;
    }

    .input-v3-container i {
        position: absolute;
        left: 5px;
        top: 8px;
        color: var(--primary-color);
        opacity: 1;
        font-size: 1.4rem !important;
        filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));
        transition: 0.3s;
    }

    .input-v3-container:focus-within {
        border-bottom-color: var(--primary-color);
        box-shadow: 0 5px 15px rgba(212, 175, 55, 0.1);
    }

    .input-v3-container:focus-within i {
        transform: scale(1.1);
        color: #fff;
    }

    .btn-v3-submit {
        width: 100%;
        height: 68px;
        border-radius: 34px;
        border: none;
        background: linear-gradient(90deg, #d4af37, #b8860b);
        color: #000;
        font-weight: 900;
        font-size: 1.42rem;
        cursor: pointer;
        margin-top: 12px;
        transition: 0.4s;
        box-shadow: 0 15px 35px rgba(212, 175, 55, 0.25);
    }

    .btn-v3-submit:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 20px 45px rgba(212, 175, 55, 0.4);
    }

    .footer-v3-links {
        text-align: center;
        margin-top: 12px;
        padding-top: 8px;
        color: #888;
        font-size: 1.05rem;
    }

    .footer-v3-links p {
        margin: 0;
    }

    .footer-v3-links a {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 800;
        margin-right: 5px;
    }

    .footer-v3-links p:last-child {
        margin-top: 8px !important;
    }

    .footer-v3-links p:last-child a {
        color: #a58a52 !important;
        font-size: 1.08rem !important;
        font-weight: 800 !important;
    }

    /* THE CARD IN FRONT */
    .visual-3d-card {
        position: absolute;
        left: 0;
        /* Align to left in RTL, overlapping the form card */
        width: 500px;
        height: 650px;
        background: #050505;
        border-radius: 70px;
        z-index: 20;
        /* TOP LAYER */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(212, 175, 55, 0.2);
        /* The crucial shadow that falls ONTO the form card behind */
        box-shadow: 40px 0 80px rgba(0, 0, 0, 0.9), 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .icon-3d-ring {
        position: relative;
        margin-bottom: 50px;
        width: 250px;
        height: 250px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .inner-icon {
        font-size: 10rem;
        color: var(--primary-color);
        filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8));
        z-index: 5;
    }

    .pulsing-glow {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
        border-radius: 50%;
        opacity: 0.5;
        animation: pulse 8s infinite linear;
    }

    @keyframes pulse {

        0%,
        100% {
            transform: scale(1);
            opacity: 0.3;
        }

        50% {
            transform: scale(1.2);
            opacity: 0.6;
        }
    }

    .visual-v3-text h3 {
        font-size: 3.65rem;
        font-weight: 900;
        color: #fff;
        margin-bottom: 5px;
    }

    .visual-v3-text p {
        color: var(--primary-color);
        font-size: 1.22rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 4px;
        text-align: center;
    }

    .error-msg-v3 {
        background: rgba(231, 76, 60, 0.1);
        color: #ff7675;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 25px;
        text-align: center;
        font-weight: 700;
    }

    /* MOBILE (Stacking) */
    @media (max-width: 1000px) {
        .auth-stage-3d {
            width: 100%;
            height: auto;
            flex-direction: column;
        }

        .visual-3d-card {
            position: relative;
            width: 100%;
            height: 350px;
            border-radius: 40px;
            margin-bottom: -60px;
            z-index: 20;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .form-3d-card {
            position: relative;
            width: 100%;
            height: auto;
            border-radius: 40px;
            padding: 100px 30px 40px;
            z-index: 10;
            transform: none;
            right: auto;
            left: auto;
        }

        .inner-icon {
            font-size: 5rem;
        }

        .visual-v3-text h3 {
            font-size: 2.2rem;
        }
    }

    @media (max-width: 767.98px) {
        .auth-v3-wrapper {
            position: relative;
            min-height: 100vh;
            padding: 100px 14px 24px;
            align-items: flex-start;
            overflow-y: auto;
        }

        .auth-stage-3d {
            width: 100%;
            max-width: 100%;
        }

        .visual-3d-card {
            width: 100%;
            height: 210px;
            border-radius: 28px;
            margin-bottom: -26px;
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.28);
        }

        .form-3d-card {
            width: 100%;
            height: auto;
            min-height: 0;
            border-radius: 28px;
            padding: 50px 18px 24px !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
        }

        .form-v3-inner {
            max-width: 100%;
            padding-top: 8px;
        }

        .form-header-v3 h2 {
            font-size: 1.7rem;
            line-height: 1.35;
            margin-bottom: 6px;
        }

        .form-header-v3 p {
            font-size: 0.95rem;
            margin-bottom: 18px;
            line-height: 1.8;
        }

        .input-v3-group {
            margin-bottom: 18px;
        }

        .input-v3-group label {
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .input-v3-container {
            padding-bottom: 8px;
        }

        .input-v3-container input {
            font-size: 1.05rem;
            padding-left: 38px;
        }

        .input-v3-container i {
            font-size: 1.15rem;
            top: 10px;
        }

        .btn-v3-submit {
            height: 58px;
            font-size: 1.08rem;
            margin-top: 8px;
        }

        .footer-v3-links {
            margin-top: 14px;
            padding-top: 12px;
            font-size: 0.95rem;
        }

        .footer-v3-links p:last-child a {
            font-size: 0.98rem !important;
        }

        .icon-3d-ring {
            width: 132px;
            height: 132px;
            margin-bottom: 14px;
        }

        .inner-icon {
            font-size: 3.6rem;
        }

        .visual-v3-text h3 {
            font-size: 2rem;
        }

        .visual-v3-text p {
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
    }

    [data-theme="light"] .auth-v3-wrapper {
        background:
            radial-gradient(circle at top right, rgba(181, 138, 45, 0.15), transparent 24%),
            radial-gradient(circle at top left, rgba(181, 138, 45, 0.08), transparent 30%),
            linear-gradient(180deg, #faf6ee 0%, #f3e8d5 48%, #fbf7ef 100%);
    }

    [data-theme="light"] .form-3d-card {
        background: rgba(255, 253, 248, 0.84);
        border: 1px solid rgba(143, 109, 39, 0.18);
        box-shadow: 0 28px 70px rgba(96, 67, 24, 0.14);
        backdrop-filter: blur(26px);
    }

    [data-theme="light"] .form-header-v3 h2,
    [data-theme="light"] .visual-v3-text h3 {
        color: #2f2a22;
    }

    [data-theme="light"] .form-header-v3 p,
    [data-theme="light"] .footer-v3-links,
    [data-theme="light"] .footer-v3-links p {
        color: #766b58;
    }

    [data-theme="light"] .input-v3-group label {
        color: #6f6452;
    }

    [data-theme="light"] .input-v3-container {
        border-bottom: 2px solid rgba(181, 138, 45, 0.45);
        background: rgba(242, 232, 212, 0.56);
        border-radius: 16px 16px 10px 10px;
        padding: 14px 14px 12px;
    }

    [data-theme="light"] .input-v3-container input {
        color: #2f2a22;
    }

    [data-theme="light"] .input-v3-container input::placeholder {
        color: #8a7b63;
    }

    [data-theme="light"] .input-v3-container i {
        color: #8f6d27;
        filter: none;
    }

    [data-theme="light"] .input-v3-container:focus-within {
        background: rgba(255, 253, 248, 0.96);
        box-shadow: 0 12px 28px rgba(143, 109, 39, 0.12);
    }

    [data-theme="light"] .input-v3-container:focus-within i {
        color: #b58a2d;
    }

    [data-theme="light"] .btn-v3-submit {
        background: linear-gradient(135deg, #cda646 0%, #b58a2d 100%);
        color: #fff;
        box-shadow: 0 12px 26px rgba(143, 109, 39, 0.28);
    }

    [data-theme="light"] .btn-v3-submit:hover {
        box-shadow: 0 16px 32px rgba(143, 109, 39, 0.24);
    }

    [data-theme="light"] .footer-v3-links {
        border-top: 1px solid rgba(143, 109, 39, 0.14);
    }

    [data-theme="light"] .footer-v3-links a {
        color: #8f6d27;
    }

    [data-theme="light"] .footer-v3-links p:last-child a {
        color: #7d6428 !important;
    }

    [data-theme="light"] .visual-3d-card {
        background: linear-gradient(160deg, #fffdf8 0%, #f3e7d0 55%, #ead8b6 100%);
        border: 1px solid rgba(143, 109, 39, 0.2);
        box-shadow: 30px 0 65px rgba(96, 67, 24, 0.16), 0 16px 40px rgba(96, 67, 24, 0.12);
    }

    [data-theme="light"] .inner-icon {
        color: #b58a2d;
        filter: drop-shadow(0 12px 24px rgba(143, 109, 39, 0.18));
    }

    [data-theme="light"] .visual-v3-text p {
        color: #8f6d27;
    }

    [data-theme="light"] .error-msg-v3 {
        background: rgba(198, 74, 62, 0.12);
        color: #a23b31;
        border: 1px solid rgba(162, 59, 49, 0.16);
    }

    [data-theme="light"] .form-v3-inner {
        max-width: 350px;
        padding-top: 24px;
    }

    [data-theme="light"] input:-webkit-autofill,
    [data-theme="light"] input:-webkit-autofill:hover,
    [data-theme="light"] input:-webkit-autofill:focus,
    [data-theme="light"] input:-webkit-autofill:active {
        -webkit-text-fill-color: #2f2a22;
        box-shadow: 0 0 0 1000px rgba(242, 232, 212, 0.92) inset;
        transition: background-color 9999s ease-in-out 0s;
        border-radius: 12px;
    }
</style>
{% endblock %}
