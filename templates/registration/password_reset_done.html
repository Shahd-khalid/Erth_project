{% extends 'base.html' %}

{% block content %}
<div class="auth-v3-wrapper">
    <div class="auth-stage-3d">
        <div class="stage-layer-under form-3d-card">
            <div class="form-v3-inner">
                <div class="form-header-v3">
                    <h2>تم إرسال البريد</h2>
                    <p>لقد أرسلنا تعليمات لضبط كلمة المرور الخاصة بك إلى بريدك الإلكتروني.</p>
                </div>

                <div class="status-box-v3">
                    <i class="fas fa-paper-plane"></i>
                    <p>إذا لم تظهر الرسالة في صندوق الوارد، يرجى التحقق من مجلد البريد المهمل (Spam).</p>
                </div>

                <div class="footer-v3-links">
                    <p><a href="{% url 'users:login' %}">العودة لتسجيل الدخول</a></p>
                </div>
            </div>
        </div>

        <div class="stage-layer-over visual-3d-card">
            <div class="visual-v3-content">
                <div class="icon-3d-ring">
                    <div class="inner-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="pulsing-glow"></div>
                </div>
                <div class="visual-v3-text">
                    <h3>إرث</h3>
                    <p>تفقد بريدك الآن</p>
                </div>
            </div>
            <div class="depth-shadow"></div>
        </div>
    </div>
</div>

<style>
    /* Reuse consistent styles */
    .auth-v3-wrapper { min-height: 100vh; background: var(--premium-gradient); display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999; overflow: hidden; padding: 20px; }
    .auth-stage-3d { position: relative; width: 1000px; height: 650px; display: flex; align-items: center; }
    .form-3d-card { position: absolute; right: 0; width: 700px; height: 550px; background: rgba(25, 25, 25, 0.6); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 60px; z-index: 10; padding: 60px 100px 60px 250px; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5); display: flex; align-items: center; }
    .form-v3-inner { width: 100%; max-width: 350px; }
    .form-header-v3 h2 { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 20px; }
    .form-header-v3 p { color: #ccc; font-size: 1rem; line-height: 1.6; }
    .status-box-v3 { background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--primary-color); border-radius: 20px; padding: 25px; text-align: center; margin: 30px 0; }
    .status-box-v3 i { font-size: 3rem; color: var(--primary-color); margin-bottom: 15px; display: block; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
    .status-box-v3 p { color: #888; font-size: 0.9rem; margin: 0; }
    .footer-v3-links { text-align: center; margin-top: 30px; }
    .footer-v3-links a { color: var(--primary-color); text-decoration: none; font-weight: 700; }
    .visual-3d-card { position: absolute; left: 0; width: 500px; height: 650px; background: #050505; border-radius: 70px; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 40px 0 80px rgba(0, 0, 0, 0.9), 0 20px 60px rgba(0, 0, 0, 0.5); }
    .inner-icon { font-size: 8rem; color: var(--primary-color); filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8)); z-index: 5; }
    .visual-v3-text h3 { font-size: 3.2rem; font-weight: 900; color: #fff; margin-bottom: 5px; }
    .visual-v3-text p { color: var(--primary-color); font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; text-align: center; }

    [data-theme="light"] .auth-v3-wrapper {
        background:
            radial-gradient(circle at top right, rgba(181, 138, 45, 0.15), transparent 24%),
            radial-gradient(circle at top left, rgba(181, 138, 45, 0.08), transparent 30%),
            linear-gradient(180deg, #faf6ee 0%, #f3e8d5 48%, #fbf7ef 100%);
    }

    [data-theme="light"] .form-3d-card {
        background: rgba(255, 253, 248, 0.84);
        border: 1px solid rgba(143, 109, 39, 0.18);
        box-shadow: 0 28px 70px rgba(96, 67, 24, 0.14);
        backdrop-filter: blur(26px);
    }

    [data-theme="light"] .form-header-v3 h2,
    [data-theme="light"] .visual-v3-text h3 {
        color: #2f2a22;
    }

    [data-theme="light"] .form-header-v3 p,
    [data-theme="light"] .status-box-v3 p {
        color: #766b58;
    }

    [data-theme="light"] .status-box-v3 {
        background: rgba(60, 123, 187, 0.08);
        border: 1px dashed rgba(143, 109, 39, 0.22);
    }

    [data-theme="light"] .status-box-v3 i,
    [data-theme="light"] .footer-v3-links a,
    [data-theme="light"] .visual-v3-text p {
        color: #8f6d27;
    }

    [data-theme="light"] .visual-3d-card {
        background: linear-gradient(160deg, #fffdf8 0%, #f3e7d0 55%, #ead8b6 100%);
        border: 1px solid rgba(143, 109, 39, 0.2);
        box-shadow: 30px 0 65px rgba(96, 67, 24, 0.16), 0 16px 40px rgba(96, 67, 24, 0.12);
    }

    [data-theme="light"] .inner-icon {
        color: #b58a2d;
        filter: drop-shadow(0 12px 24px rgba(143, 109, 39, 0.18));
    }

    @media (min-width: 1001px) {
        [data-theme="light"] .auth-stage-3d {
            width: min(1080px, 100%);
            height: auto;
            display: flex;
            flex-direction: row-reverse;
            align-items: stretch;
            gap: 24px;
        }

        [data-theme="light"] .form-3d-card,
        [data-theme="light"] .visual-3d-card {
            position: relative;
            inset: auto;
            height: auto;
            min-height: 520px;
            border-radius: 38px;
        }

        [data-theme="light"] .form-3d-card {
            width: 100%;
            padding: 56px 54px;
        }

        [data-theme="light"] .visual-3d-card {
            width: 360px;
            min-width: 360px;
        }
    }
</style>
{% endblock %}
