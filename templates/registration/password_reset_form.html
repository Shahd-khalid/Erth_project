{% extends 'base.html' %}

{% block content %}
<div class="auth-v3-wrapper">
    <div class="auth-stage-3d">
        <div class="stage-layer-under form-3d-card">
            <div class="form-v3-inner">
                <div class="form-header-v3">
                    <h2>استعادة كلمة المرور</h2>
                    <p>أدخل بريدك الإلكتروني لنرسل لك رابط استعادة الحساب.</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="error-msg-v3">يرجى التحقق من البريد الإلكتروني المدخل</div>
                    {% endif %}

                    <div class="input-v3-group">
                        <label>البريد الإلكتروني</label>
                        <div class="input-v3-container">
                            <input type="email" name="email" maxlength="254" required id="id_email" placeholder="example@mail.com">
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-v3-submit">
                        إرسال رابط الاستعادة
                    </button>

                    <div class="footer-v3-links">
                        <p>تذكرت كلمة المرور؟ <a href="{% url 'users:login' %}">تسجيل الدخول</a></p>
                    </div>
                </form>
            </div>
        </div>

        <div class="stage-layer-over visual-3d-card">
            <div class="visual-v3-content">
                <div class="icon-3d-ring">
                    <div class="inner-icon">
                        <i class="fas fa-key"></i>
                    </div>
                    <div class="pulsing-glow"></div>
                </div>
                <div class="visual-v3-text">
                    <h3>إرث</h3>
                    <p>أمان حسابك أولويتنا</p>
                </div>
            </div>
            <div class="depth-shadow"></div>
        </div>
    </div>
</div>

<style>
    /* Reuse styles from login.html */
    .auth-v3-wrapper {
        min-height: 100vh;
        background: var(--premium-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        overflow: hidden;
        padding: 20px;
    }
    .auth-stage-3d { position: relative; width: 1000px; height: 650px; display: flex; align-items: center; }
    .form-3d-card {
        position: absolute; right: 0; width: 700px; height: 550px;
        background: rgba(25, 25, 25, 0.6); backdrop-filter: blur(50px);
        border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 60px;
        z-index: 10; padding: 60px 100px 60px 250px;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5); display: flex; align-items: center;
    }
    .form-v3-inner { width: 100%; max-width: 350px; }
    .form-header-v3 h2 { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 5px; }
    .form-header-v3 p { color: #888; font-size: 0.9rem; margin-bottom: 40px; }
    .input-v3-group { margin-bottom: 30px; }
    .input-v3-group label { display: block; color: #666; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
    .input-v3-container { position: relative; border-bottom: 2px solid rgba(212, 175, 55, 0.4); transition: 0.3; padding-bottom: 10px; margin-top: 5px; }
    .input-v3-container input { width: 100%; background: transparent; border: none; color: #fff; font-size: 1.15rem; outline: none; padding-right: 10px; padding-left: 45px; text-align: right; }
    .input-v3-container i { position: absolute; left: 5px; top: 8px; color: var(--primary-color); font-size: 1.4rem; filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5)); }
    .btn-v3-submit { width: 100%; height: 60px; border-radius: 30px; border: none; background: linear-gradient(90deg, #d4af37, #b8860b); color: #000; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 10px; transition: 0.4s; box-shadow: 0 15px 35px rgba(212, 175, 55, 0.25); }
    .btn-v3-submit:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 20px 45px rgba(212, 175, 55, 0.4); }
    .footer-v3-links { text-align: center; margin-top: 30px; color: #888; }
    .footer-v3-links a { color: var(--primary-color); text-decoration: none; font-weight: 700; margin-right: 5px; }
    .visual-3d-card { position: absolute; left: 0; width: 500px; height: 650px; background: #050505; border-radius: 70px; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 40px 0 80px rgba(0, 0, 0, 0.9), 0 20px 60px rgba(0, 0, 0, 0.5); }
    .icon-3d-ring { position: relative; margin-bottom: 50px; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
    .inner-icon { font-size: 8rem; color: var(--primary-color); filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8)); z-index: 5; }
    .pulsing-glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%); border-radius: 50%; opacity: 0.5; animation: pulse 8s infinite linear; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } }
    .visual-v3-text h3 { font-size: 3.2rem; font-weight: 900; color: #fff; margin-bottom: 5px; }
    .visual-v3-text p { color: var(--primary-color); font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; text-align: center; }
    .error-msg-v3 { background: rgba(231, 76, 60, 0.1); color: #ff7675; padding: 12px; border-radius: 12px; margin-bottom: 25px; text-align: center; font-weight: 700; }
    @media (max-width: 1000px) {
        .auth-stage-3d { width: 100%; height: auto; flex-direction: column; }
        .visual-3d-card { position: relative; width: 100%; height: 300px; border-radius: 40px; margin-bottom: -60px; z-index: 20; }
        .form-3d-card { position: relative; width: 100%; height: auto; border-radius: 40px; padding: 100px 30px 40px; z-index: 10; margin-right: 0; }
        .inner-icon { font-size: 4rem; }
    }

    [data-theme="light"] .auth-v3-wrapper {
        background:
            radial-gradient(circle at top right, rgba(181, 138, 45, 0.15), transparent 24%),
            radial-gradient(circle at top left, rgba(181, 138, 45, 0.08), transparent 30%),
            linear-gradient(180deg, #faf6ee 0%, #f3e8d5 48%, #fbf7ef 100%);
    }

    [data-theme="light"] .form-3d-card {
        background: rgba(255, 253, 248, 0.84);
        border: 1px solid rgba(143, 109, 39, 0.18);
        box-shadow: 0 28px 70px rgba(96, 67, 24, 0.14);
        backdrop-filter: blur(26px);
    }

    [data-theme="light"] .form-header-v3 h2,
    [data-theme="light"] .visual-v3-text h3 {
        color: #2f2a22;
    }

    [data-theme="light"] .form-header-v3 p,
    [data-theme="light"] .footer-v3-links,
    [data-theme="light"] .footer-v3-links p {
        color: #766b58;
    }

    [data-theme="light"] .input-v3-group label {
        color: #6f6452;
    }

    [data-theme="light"] .input-v3-container {
        border-bottom: 2px solid rgba(181, 138, 45, 0.45);
        background: rgba(242, 232, 212, 0.56);
        border-radius: 16px 16px 10px 10px;
        padding: 14px 14px 12px;
    }

    [data-theme="light"] .input-v3-container input {
        color: #2f2a22;
    }

    [data-theme="light"] .input-v3-container input::placeholder {
        color: #8a7b63;
    }

    [data-theme="light"] .input-v3-container i {
        color: #8f6d27;
        filter: none;
    }

    [data-theme="light"] .btn-v3-submit {
        background: linear-gradient(135deg, #cda646 0%, #b58a2d 100%);
        color: #fff;
        box-shadow: 0 12px 26px rgba(143, 109, 39, 0.28);
    }

    [data-theme="light"] .footer-v3-links a,
    [data-theme="light"] .visual-v3-text p {
        color: #8f6d27;
    }

    [data-theme="light"] .footer-v3-links {
        border-top: 1px solid rgba(143, 109, 39, 0.14);
    }

    [data-theme="light"] .visual-3d-card {
        background: linear-gradient(160deg, #fffdf8 0%, #f3e7d0 55%, #ead8b6 100%);
        border: 1px solid rgba(143, 109, 39, 0.2);
        box-shadow: 30px 0 65px rgba(96, 67, 24, 0.16), 0 16px 40px rgba(96, 67, 24, 0.12);
    }

    [data-theme="light"] .inner-icon {
        color: #b58a2d;
        filter: drop-shadow(0 12px 24px rgba(143, 109, 39, 0.18));
    }

    [data-theme="light"] .error-msg-v3 {
        background: rgba(198, 74, 62, 0.12);
        color: #a23b31;
        border: 1px solid rgba(162, 59, 49, 0.16);
    }

    @media (max-width: 767.98px) {
        .auth-v3-wrapper {
            position: relative;
            min-height: 100vh;
            padding: 100px 14px 24px;
            align-items: flex-start;
            overflow-y: auto;
        }

        .auth-stage-3d {
            width: 100%;
            max-width: 100%;
            height: auto;
            flex-direction: column;
        }

        .visual-3d-card {
            position: relative;
            width: 100%;
            height: 195px;
            border-radius: 28px;
            margin-bottom: -26px;
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.24);
        }

        .form-3d-card {
            position: relative;
            width: 100%;
            height: auto;
            min-height: 0;
            border-radius: 28px;
            padding: 48px 16px 24px !important;
        }

        .form-v3-inner {
            max-width: 100%;
        }

        .form-header-v3 h2 {
            font-size: 1.6rem;
            line-height: 1.35;
        }

        .form-header-v3 p {
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .input-v3-group {
            margin-bottom: 16px;
        }

        .input-v3-group label {
            font-size: 0.92rem;
        }

        .input-v3-container input {
            font-size: 1rem;
            padding-left: 38px;
        }

        .input-v3-container i {
            font-size: 1.1rem;
            top: 10px;
        }

        .btn-v3-submit {
            height: 56px;
            font-size: 1.05rem;
        }

        .footer-v3-links {
            margin-top: 14px;
            font-size: 0.95rem;
        }

        .icon-3d-ring {
            width: 132px;
            height: 132px;
            margin-bottom: 14px;
        }

        .inner-icon {
            font-size: 3.4rem;
        }

        .visual-v3-text h3 {
            font-size: 1.9rem;
        }

        .visual-v3-text p {
            font-size: 0.92rem;
            letter-spacing: 1px;
        }
    }

    @media (min-width: 1001px) {
        [data-theme="light"] .auth-stage-3d {
            width: min(1080px, 100%);
            height: auto;
            display: flex;
            flex-direction: row-reverse;
            align-items: stretch;
            gap: 24px;
        }

        [data-theme="light"] .form-3d-card,
        [data-theme="light"] .visual-3d-card {
            position: relative;
            inset: auto;
            height: auto;
            min-height: 540px;
            border-radius: 38px;
        }

        [data-theme="light"] .form-3d-card {
            width: 100%;
            padding: 56px 54px;
        }

        [data-theme="light"] .visual-3d-card {
            width: 360px;
            min-width: 360px;
        }
    }

    [data-theme="light"] input:-webkit-autofill,
    [data-theme="light"] input:-webkit-autofill:hover,
    [data-theme="light"] input:-webkit-autofill:focus,
    [data-theme="light"] input:-webkit-autofill:active {
        -webkit-text-fill-color: #2f2a22;
        box-shadow: 0 0 0 1000px rgba(242, 232, 212, 0.92) inset;
        transition: background-color 9999s ease-in-out 0s;
        border-radius: 12px;
    }
</style>
{% endblock %}
