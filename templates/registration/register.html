{% extends 'base.html' %}

{% block content %}
<div class="auth-v3-wrapper">
    <!-- The Stage -->
    <div class="auth-stage-3d">

        <!-- LAYER 1: The Form (Behind) -->
        <div class="stage-layer-under form-3d-card">
            <div class="form-v3-inner">
                <div class="form-header-v3">
                    <h2>إنشاء حساب</h2>
                    <p>أدخل بياناتك الأساسية للبدء.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="form-body-v3">
                        {% for field in form %}
                        <div class="input-v3-group">
                            <label>{{ field.label }}</label>
                            <div class="input-v3-container">
                                {{ field }}
                                <i class="fas fa-id-badge"></i>
                            </div>
                            {% for error in field.errors %}<div class="error-msg-v3"
                                style="margin-top:5px; font-size:0.75rem;">{{ error }}</div>{% endfor %}
                        </div>
                        {% endfor %}
                    </div>

                    <button type="submit" class="btn-v3-submit">
                        إتمام التسجيل
                    </button>

                    <div class="footer-v3-links">
                        <p>لديك حساب بالفعل؟ <a href="{% url 'users:login' %}">سجل الدخول</a></p>
                    </div>
                </form>
            </div>
        </div>

        <!-- LAYER 2: The Visual (Foreground) -->
        <div class="stage-layer-over visual-3d-card">
            <div class="visual-v3-content">
                <div class="icon-3d-ring">
                    <div class="inner-icon">
                        <i class="fas fa-id-card"></i>
                    </div>
                </div>
                <div class="visual-v3-text">
                    <h3>إرث</h3>
                    <p>هوية شرعية موثقة</p>
                </div>
            </div>
        </div>

    </div>
</div>

<style>
    /* Reuse Core V3 3D Logic */
    .auth-v3-wrapper {
        min-height: 100vh;
        background: linear-gradient(135deg, #000000 0%, #1c1502 40%, #2a2005 50%, #1c1502 60%, #000000 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
    }

    .auth-stage-3d {
        position: relative;
        width: 1000px;
        height: 650px;
        display: flex;
        align-items: center;
    }

    .form-3d-card {
        position: absolute;
        right: 0;
        width: 700px;
        height: 550px;
        background: rgba(25, 25, 25, 0.6);
        backdrop-filter: blur(50px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 60px;
        z-index: 10;
        padding: 60px 100px 60px 250px;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
    }

    .form-v3-inner {
        width: 100%;
        max-width: 400px;
    }

    .form-header-v3 h2 {
        font-size: 2rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 5px;
    }

    .form-header-v3 p {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 30px;
    }

    .input-v3-group {
        margin-bottom: 25px;
    }

    .input-v3-group label {
        display: block;
        color: #666;
        font-size: 0.8rem;
        font-weight: 800;
        margin-bottom: 8px;
    }

    .input-v3-container {
        position: relative;
        border-bottom: 2px solid rgba(212, 175, 55, 0.4);
        padding-bottom: 10px;
        margin-top: 5px;
        transition: 0.3s;
    }

    .input-v3-container input {
        width: 100%;
        background: transparent;
        border: none;
        color: #fff;
        font-size: 1.1rem;
        outline: none;
        padding-right: 10px;
        padding-left: 45px;
        text-align: right;
    }

    .input-v3-container i {
        position: absolute;
        left: 5px;
        top: 8px;
        color: var(--primary-color);
        opacity: 1;
        font-size: 1.3rem;
        filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));
    }

    .input-v3-container:focus-within {
        border-bottom-color: var(--primary-color);
    }

    .input-v3-container:focus-within i {
        transform: scale(1.1);
        color: #fff;
    }

    .btn-v3-submit {
        width: 100%;
        height: 50px;
        border-radius: 25px;
        border: none;
        background: linear-gradient(90deg, #d4af37, #b8860b);
        color: #000;
        font-weight: 900;
        font-size: 1.15rem;
        cursor: pointer;
        transition: 0.3s;
    }

    .visual-3d-card {
        position: absolute;
        left: 0;
        width: 500px;
        height: 650px;
        background: #050505;
        border-radius: 70px;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(212, 175, 55, 0.2);
        box-shadow: 40px 0 80px rgba(0, 0, 0, 0.9), 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .inner-icon {
        font-size: 7.5rem;
        color: var(--primary-color);
        filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8));
    }

    .visual-v3-text h3 {
        font-size: 2.8rem;
        font-weight: 900;
        color: #fff;
        text-align: center;
    }

    .visual-v3-text p {
        color: var(--primary-color);
        font-size: 1rem;
        text-align: center;
        font-weight: 700;
        letter-spacing: 2px;
    }

    .footer-v3-links {
        text-align: center;
        margin-top: 25px;
        color: #888;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 20px;
    }

    .footer-v3-links a {
        color: var(--primary-color);
        font-weight: 800;
        text-decoration: none;
    }

    @media (max-width: 1000px) {
        .auth-stage-3d {
            width: 100%;
            height: auto;
            flex-direction: column;
        }

        .visual-3d-card {
            position: relative;
            width: 95%;
            height: 250px;
            border-radius: 40px;
            margin-bottom: -50px;
        }

        .form-3d-card {
            position: relative;
            width: 100%;
            height: auto;
            border-radius: 40px;
            padding: 80px 25px 40px;
            right: auto;
            transform: none;
        }
    }

    [data-theme="light"] .auth-v3-wrapper {
        background:
            radial-gradient(circle at top right, rgba(181, 138, 45, 0.15), transparent 24%),
            radial-gradient(circle at top left, rgba(181, 138, 45, 0.08), transparent 30%),
            linear-gradient(180deg, #faf6ee 0%, #f3e8d5 48%, #fbf7ef 100%);
    }

    [data-theme="light"] .form-3d-card {
        background: rgba(255, 253, 248, 0.84);
        border: 1px solid rgba(143, 109, 39, 0.18);
        box-shadow: 0 28px 70px rgba(96, 67, 24, 0.14);
        backdrop-filter: blur(26px);
    }

    [data-theme="light"] .form-header-v3 h2,
    [data-theme="light"] .visual-v3-text h3 {
        color: #2f2a22;
    }

    [data-theme="light"] .form-header-v3 p,
    [data-theme="light"] .footer-v3-links,
    [data-theme="light"] .footer-v3-links p {
        color: #766b58;
    }

    [data-theme="light"] .input-v3-group label {
        color: #6f6452;
    }

    [data-theme="light"] .input-v3-container {
        border-bottom: 2px solid rgba(181, 138, 45, 0.45);
        background: rgba(242, 232, 212, 0.56);
        border-radius: 16px 16px 10px 10px;
        padding: 14px 14px 12px;
    }

    [data-theme="light"] .input-v3-container input {
        color: #2f2a22;
    }

    [data-theme="light"] .input-v3-container input::placeholder {
        color: #8a7b63;
    }

    [data-theme="light"] .input-v3-container i {
        color: #8f6d27;
        filter: none;
    }

    [data-theme="light"] .input-v3-container:focus-within {
        background: rgba(255, 253, 248, 0.96);
        box-shadow: 0 12px 28px rgba(143, 109, 39, 0.12);
    }

    [data-theme="light"] .input-v3-container:focus-within i {
        color: #b58a2d;
    }

    [data-theme="light"] .btn-v3-submit {
        background: linear-gradient(135deg, #cda646 0%, #b58a2d 100%);
        color: #fff;
        box-shadow: 0 12px 26px rgba(143, 109, 39, 0.28);
    }

    [data-theme="light"] .visual-3d-card {
        background: linear-gradient(160deg, #fffdf8 0%, #f3e7d0 55%, #ead8b6 100%);
        border: 1px solid rgba(143, 109, 39, 0.2);
        box-shadow: 30px 0 65px rgba(96, 67, 24, 0.16), 0 16px 40px rgba(96, 67, 24, 0.12);
    }

    [data-theme="light"] .inner-icon {
        color: #b58a2d;
        filter: drop-shadow(0 12px 24px rgba(143, 109, 39, 0.18));
    }

    [data-theme="light"] .visual-v3-text p,
    [data-theme="light"] .footer-v3-links a {
        color: #8f6d27;
    }

    [data-theme="light"] .footer-v3-links {
        border-top: 1px solid rgba(143, 109, 39, 0.14);
    }

    [data-theme="light"] .form-v3-inner {
        max-width: 400px;
    }

    [data-theme="light"] input:-webkit-autofill,
    [data-theme="light"] input:-webkit-autofill:hover,
    [data-theme="light"] input:-webkit-autofill:focus,
    [data-theme="light"] input:-webkit-autofill:active {
        -webkit-text-fill-color: #2f2a22;
        box-shadow: 0 0 0 1000px rgba(242, 232, 212, 0.92) inset;
        transition: background-color 9999s ease-in-out 0s;
        border-radius: 12px;
    }

    @media (max-width: 767.98px) {
        .auth-v3-wrapper {
            position: relative;
            min-height: 100vh;
            padding: 100px 14px 24px;
            align-items: flex-start;
            overflow-y: auto;
        }

        .auth-stage-3d {
            width: 100%;
            max-width: 100%;
            height: auto;
            flex-direction: column;
        }

        .visual-3d-card {
            position: relative;
            width: 100%;
            height: 195px;
            border-radius: 28px;
            margin-bottom: -26px;
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.24);
        }

        .form-3d-card {
            position: relative;
            width: 100%;
            height: auto;
            min-height: 0;
            border-radius: 28px;
            padding: 48px 16px 24px !important;
        }

        .form-v3-inner {
            max-width: 100%;
        }

        .form-header-v3 h2 {
            font-size: 1.6rem;
            line-height: 1.35;
        }

        .form-header-v3 p {
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .input-v3-group {
            margin-bottom: 16px;
        }

        .input-v3-group label {
            font-size: 0.92rem;
        }

        .input-v3-container input {
            font-size: 1rem;
            padding-left: 38px;
        }

        .input-v3-container i {
            font-size: 1.1rem;
            top: 10px;
        }

        .btn-v3-submit {
            height: 56px;
            font-size: 1.05rem;
        }

        .footer-v3-links {
            margin-top: 14px;
            padding-top: 12px;
            font-size: 0.95rem;
        }

        .inner-icon {
            font-size: 3.4rem;
        }

        .visual-v3-text h3 {
            font-size: 1.9rem;
        }

        .visual-v3-text p {
            font-size: 0.92rem;
            letter-spacing: 1px;
        }
    }
</style>
{% endblock %}
